<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff0"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4f4"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#0d1117"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#ff4444">FIX 3 — LCD_RST bridge VBUS-GND [CRITICO]</text>
  <text x="500" y="50" text-anchor="middle" font-size="13" fill="#aaa">F.Cu — trace orizzontale a y=33mm — 1 taglio, NO ponticello</text>

  <!-- Legend -->
  <rect x="20" y="65" width="200" height="120" rx="6" fill="#161b22" stroke="#333"/>
  <text x="30" y="85" font-size="12" font-weight="bold" fill="#ccc">LEGENDA NET:</text>
  <rect x="30" y="95" width="40" height="8" fill="#ff4444" rx="2"/><text x="80" y="103" font-size="11" fill="#ff8888">VBUS (5V USB)</text>
  <rect x="30" y="115" width="40" height="8" fill="#44ff44" rx="2"/><text x="80" y="123" font-size="11" fill="#88ff88">GND</text>
  <rect x="30" y="135" width="40" height="8" fill="#ffaa00" rx="2"/><text x="80" y="143" font-size="11" fill="#ffcc44">LCD_RST (segnale)</text>
  <rect x="30" y="155" width="12" height="12" fill="#ff0" opacity="0.5"/><text x="50" y="166" font-size="11" fill="#ff0">OVERLAP / short</text>

  <!-- ======= BEFORE (top) ======= -->
  <rect x="20" y="195" width="960" height="170" rx="8" fill="#1a1a2e" stroke="#c44" stroke-width="2"/>
  <text x="500" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff4444">PRIMA — F.Cu layer, y=33mm (sotto area display)</text>

  <!-- LCD_RST trace horizontal -->
  <rect x="80" y="280" width="840" height="6" fill="#ffaa00" opacity="0.9" rx="1"/>
  <text x="500" y="275" text-anchor="middle" font-size="11" fill="#ffcc44">LCD_RST trace (w=0.2mm, orizzontale ~40mm)</text>

  <!-- GND via at x=81.5 -->
  <circle cx="180" cy="283" r="20" fill="none" stroke="#44ff44" stroke-width="4"/>
  <circle cx="180" cy="283" r="4" fill="#44ff44"/>
  <text x="180" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#44ff44">Via GND</text>
  <text x="180" y="332" text-anchor="middle" font-size="9" fill="#44ff44">(81.50, 32.96)</text>
  <!-- Overlap highlight -->
  <rect x="160" y="278" width="40" height="10" fill="#ff0" opacity="0.4"/>

  <!-- VBUS via at x=110.95 -->
  <circle cx="720" cy="283" r="20" fill="none" stroke="#ff4444" stroke-width="4"/>
  <circle cx="720" cy="283" r="4" fill="#ff4444"/>
  <text x="720" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff4444">Via VBUS</text>
  <text x="720" y="332" text-anchor="middle" font-size="9" fill="#ff4444">(110.95, 33.00)</text>
  <!-- Overlap highlight -->
  <rect x="700" y="278" width="40" height="10" fill="#ff0" opacity="0.4"/>

  <!-- Short path -->
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff0">GND &lt;--- rame LCD_RST ---&gt; VBUS = BRIDGE DIRETTO!</text>

  <!-- ======= AFTER (bottom) ======= -->
  <rect x="20" y="385" width="960" height="200" rx="8" fill="#1a1a2e" stroke="#4a4" stroke-width="2"/>
  <text x="500" y="410" text-anchor="middle" font-size="16" font-weight="bold" fill="#44ff44">DOPO — 1 taglio a x=95, y=33</text>

  <!-- LCD_RST trace LEFT segment (still connected to GND via - but we don't care, the signal goes via B.Cu) -->
  <rect x="80" y="470" width="370" height="6" fill="#ffaa00" opacity="0.5" rx="1"/>

  <!-- CUT gap -->
  <rect x="450" y="460" width="20" height="26" fill="#0d1117" stroke="#ff0" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="460" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff0">TAGLIA</text>
  <text x="460" y="525" text-anchor="middle" font-size="10" fill="#ff0">x=95, y=33</text>
  <text x="460" y="538" text-anchor="middle" font-size="10" fill="#ff0">raschia ~1mm</text>

  <!-- LCD_RST trace RIGHT segment -->
  <rect x="470" y="470" width="450" height="6" fill="#ffaa00" opacity="0.5" rx="1"/>

  <!-- GND via - now isolated from VBUS -->
  <circle cx="180" cy="473" r="20" fill="none" stroke="#44ff44" stroke-width="4"/>
  <circle cx="180" cy="473" r="4" fill="#44ff44"/>
  <text x="180" y="500" text-anchor="middle" font-size="10" fill="#44ff44">GND (isolata)</text>

  <!-- VBUS via - now isolated from GND -->
  <circle cx="720" cy="473" r="20" fill="none" stroke="#ff4444" stroke-width="4"/>
  <circle cx="720" cy="473" r="4" fill="#ff4444"/>
  <text x="720" y="500" text-anchor="middle" font-size="10" fill="#ff4444">VBUS (isolata)</text>

  <!-- B.Cu note -->
  <rect x="600" y="540" width="360" height="40" rx="6" fill="#1a3a1a" stroke="#4a4"/>
  <text x="780" y="558" text-anchor="middle" font-size="11" fill="#8f8">LCD_RST funziona via B.Cu (lato destro)</text>
  <text x="780" y="572" text-anchor="middle" font-size="11" font-weight="bold" fill="#4f4">NO ponticello necessario!</text>

  <!-- Verification box -->
  <rect x="30" y="540" width="350" height="40" rx="6" fill="#2a1a1a" stroke="#c44"/>
  <text x="205" y="558" text-anchor="middle" font-size="11" fill="#faa">Verifica: C17 pad+ (VBUS) vs C17 pad- (GND)</text>
  <text x="205" y="572" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44">Atteso: &gt;1M ohm (APERTA)</text>
</svg>