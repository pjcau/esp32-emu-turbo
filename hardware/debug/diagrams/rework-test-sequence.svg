<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="monospace">
  <rect width="1000" height="800" fill="#0d1117"/>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#44ff44">SEQUENZA TEST E VERIFICA</text>
  <text x="500" y="50" text-anchor="middle" font-size="13" fill="#aaa">Dopo ogni gruppo di fix — seguire in ordine!</text>

  <!-- Legend: where to measure -->
  <rect x="20" y="65" width="960" height="70" rx="6" fill="#161b22" stroke="#555"/>
  <text x="30" y="88" font-size="13" font-weight="bold" fill="#ccc">PUNTI DI MISURA (condensatori come test point):</text>
  <text x="30" y="115" font-size="11" fill="#ff8888">C17 = VBUS (5V USB)</text>
  <text x="220" y="115" font-size="11" fill="#ffaa44">C1 = +5V</text>
  <text x="360" y="115" font-size="11" fill="#88ccff">C2 = +3V3</text>
  <text x="500" y="115" font-size="11" fill="#ffcc44">C18 = BAT+</text>
  <text x="660" y="115" font-size="11" fill="#88ff88">pad- di ogni cap = GND</text>

  <!-- ========== STEP A — After FIX 3 ========== -->
  <rect x="20" y="150" width="470" height="200" rx="8" fill="#1a1a2e" stroke="#ff4444" stroke-width="2"/>
  <text x="255" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff4444">STEP A — Dopo FIX 3</text>
  <text x="255" y="193" text-anchor="middle" font-size="11" fill="#888">Verifica che il bridge VBUS-GND sia risolto</text>

  <!-- Test 1 -->
  <rect x="35" y="205" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="45" y="220" font-size="11" fill="#ff8888">Test 1: VBUS ↔ GND</text>
  <text x="250" y="220" font-size="11" fill="#aaa">C17 pad+ → C17 pad-</text>
  <text x="430" y="220" font-size="11" font-weight="bold" fill="#4f4">&gt;1M</text>
  <text x="45" y="235" font-size="9" fill="#666">multimetro ohm</text>

  <!-- Test 2 -->
  <rect x="35" y="247" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="45" y="262" font-size="11" fill="#ffaa44">Test 2: +5V ↔ GND</text>
  <text x="250" y="262" font-size="11" fill="#aaa">C1 pad+ → C1 pad-</text>
  <text x="430" y="262" font-size="11" font-weight="bold" fill="#4f4">&gt;1M</text>

  <!-- Test 3 -->
  <rect x="35" y="289" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="45" y="304" font-size="11" fill="#ffcc44">Test 3: BAT+ ↔ GND</text>
  <text x="250" y="304" font-size="11" fill="#aaa">C18 pad+ → C18 pad-</text>
  <text x="430" y="304" font-size="11" font-weight="bold" fill="#4f4">&gt;1M</text>

  <!-- Decision -->
  <text x="255" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#4f4">Tutti &gt;1M → procedi a FIX 4-8</text>

  <!-- ========== STEP B — After FIX 4-8 ========== -->
  <rect x="510" y="150" width="470" height="200" rx="8" fill="#1a1a2e" stroke="#ff8800" stroke-width="2"/>
  <text x="745" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff8800">STEP B — Dopo FIX 4-8</text>
  <text x="745" y="193" text-anchor="middle" font-size="11" fill="#888">Verifica che +3V3-GND bridge sia risolto</text>

  <rect x="525" y="205" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="535" y="220" font-size="11" fill="#88ccff">Test 4: +3V3 ↔ GND</text>
  <text x="720" y="220" font-size="11" fill="#aaa">C2 pad+ → C2 pad-</text>
  <text x="920" y="220" font-size="11" font-weight="bold" fill="#4f4">&gt;1M</text>

  <!-- Repeat power tests -->
  <rect x="525" y="247" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="535" y="262" font-size="11" fill="#888">Ricontrolla Test 1-3</text>
  <text x="720" y="262" font-size="11" fill="#aaa">VBUS, +5V, BAT+</text>
  <text x="920" y="262" font-size="11" font-weight="bold" fill="#4f4">&gt;1M</text>

  <text x="745" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#4f4">Tutti &gt;1M → procedi a test accensione</text>

  <!-- Warning -->
  <rect x="525" y="320" width="440" height="25" rx="4" fill="#2a1a1a" stroke="#f44"/>
  <text x="745" y="337" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff4444">Se qualcuno &lt;1M → STOP! Ricontrollare FIX 4-8</text>

  <!-- ========== STEP C — Power-on ========== -->
  <rect x="20" y="370" width="470" height="200" rx="8" fill="#1a1a2e" stroke="#4f4" stroke-width="2"/>
  <text x="255" y="395" text-anchor="middle" font-size="16" font-weight="bold" fill="#44ff44">STEP C — Test accensione</text>
  <text x="255" y="413" text-anchor="middle" font-size="11" fill="#ff8888">USARE ALIMENTATORE CON LIMITE CORRENTE!</text>

  <rect x="35" y="425" width="440" height="55" rx="4" fill="#161b22" stroke="#cc4"/>
  <text x="45" y="442" font-size="11" fill="#ccc">Impostazione: 5V / limite 100mA</text>
  <text x="45" y="458" font-size="11" fill="#ccc">Collegare USB-C</text>
  <text x="45" y="474" font-size="11" font-weight="bold" fill="#ffcc44">Corrente attesa a riposo: &lt; 50mA (senza batteria)</text>

  <rect x="35" y="490" width="440" height="65" rx="4" fill="#2a1a1a" stroke="#f44"/>
  <text x="45" y="510" font-size="12" font-weight="bold" fill="#ff4444">Se corrente va SUBITO al limite (100mA):</text>
  <text x="45" y="528" font-size="11" fill="#ff8888">→ SHORT RESIDUO! Staccare immediatamente</text>
  <text x="45" y="546" font-size="11" fill="#ff8888">→ Ricontrollare TUTTI i fix con multimetro</text>

  <!-- ========== STEP D — Voltages ========== -->
  <rect x="510" y="370" width="470" height="200" rx="8" fill="#1a1a2e" stroke="#44aaff" stroke-width="2"/>
  <text x="745" y="395" text-anchor="middle" font-size="16" font-weight="bold" fill="#44aaff">STEP D — Misura tensioni</text>
  <text x="745" y="413" text-anchor="middle" font-size="11" fill="#888">Con alimentatore collegato, multimetro su VDC</text>

  <rect x="525" y="425" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="535" y="440" font-size="11" fill="#ff8888">VBUS (C17 pad+)</text>
  <text x="740" y="440" font-size="11" font-weight="bold" fill="#4f4">5.0V</text>
  <text x="840" y="440" font-size="10" fill="#888">da USB</text>

  <rect x="525" y="467" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="535" y="482" font-size="11" fill="#ffaa44">+5V (C1 pad+)</text>
  <text x="740" y="482" font-size="11" font-weight="bold" fill="#4f4">4.8-5.2V</text>
  <text x="840" y="482" font-size="10" fill="#888">via IP5306</text>

  <rect x="525" y="509" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="535" y="524" font-size="11" fill="#88ccff">+3V3 (C2 pad+)</text>
  <text x="740" y="524" font-size="11" font-weight="bold" fill="#4f4">3.3V</text>
  <text x="840" y="524" font-size="10" fill="#888">via AMS1117</text>

  <rect x="525" y="551" width="440" height="35" rx="4" fill="#161b22" stroke="#444"/>
  <text x="535" y="566" font-size="11" fill="#ffcc44">BAT+ (C18 pad+)</text>
  <text x="740" y="566" font-size="11" font-weight="bold" fill="#4f4">0V</text>
  <text x="840" y="566" font-size="10" fill="#888">senza batteria</text>

  <!-- ========== STEP E — Signals ========== -->
  <rect x="20" y="590" width="960" height="195" rx="8" fill="#1a1a2e" stroke="#ffaa44" stroke-width="2"/>
  <text x="500" y="615" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffaa44">STEP E — Verifica segnali (dopo FIX 9-27)</text>
  <text x="500" y="633" text-anchor="middle" font-size="11" fill="#888">Multimetro in continuita — verificare che i segnali siano isolati dalle net di potenza</text>

  <!-- Signal tests -->
  <rect x="35" y="645" width="300" height="125" rx="4" fill="#161b22" stroke="#444"/>
  <text x="45" y="663" font-size="11" font-weight="bold" fill="#ccc">DISPLAY:</text>
  <text x="45" y="680" font-size="10" fill="#afa">LCD_RST: ESP32 → FPC J4 = CONNESSO</text>
  <text x="45" y="695" font-size="10" fill="#afa">LCD_DC:  ESP32 → FPC J4 = CONNESSO</text>
  <text x="45" y="710" font-size="10" fill="#afa">LCD_D0-D7: ognuno vs GND = APERTO</text>
  <text x="45" y="725" font-size="10" fill="#afa">LCD_D0-D7: ognuno vs +3V3 = APERTO</text>
  <text x="45" y="740" font-size="10" fill="#afa">LCD_D0-D7: ognuno vs VBUS = APERTO</text>
  <text x="45" y="755" font-size="10" fill="#afa">SD_CS:   vs GND = APERTO</text>

  <rect x="345" y="645" width="310" height="125" rx="4" fill="#161b22" stroke="#444"/>
  <text x="355" y="663" font-size="11" font-weight="bold" fill="#ccc">BOTTONI:</text>
  <text x="355" y="680" font-size="10" fill="#afa">BTN_UP:   pad → ESP32 = CONNESSO</text>
  <text x="355" y="695" font-size="10" fill="#afa">BTN_LEFT: pad → ESP32 = CONNESSO</text>
  <text x="355" y="710" font-size="10" fill="#afa">BTN_A:    pad → ESP32 = CONNESSO</text>
  <text x="355" y="725" font-size="10" fill="#afa">BTN_L:    pad → ESP32 = CONNESSO</text>
  <text x="355" y="740" font-size="10" fill="#afa">Tutti vs GND/+3V3 = APERTO</text>

  <rect x="665" y="645" width="300" height="125" rx="4" fill="#161b22" stroke="#444"/>
  <text x="675" y="663" font-size="11" font-weight="bold" fill="#ccc">USB:</text>
  <text x="675" y="680" font-size="10" fill="#afa">USB_D+: vs GND = APERTO</text>
  <text x="675" y="695" font-size="10" fill="#afa">USB_D-: vs GND = APERTO</text>
  <text x="675" y="710" font-size="10" fill="#afa">USB_D+: vs +3V3 = APERTO</text>
  <text x="675" y="725" font-size="10" fill="#afa">USB_D-: vs +3V3 = APERTO</text>
  <text x="675" y="750" font-size="10" font-weight="bold" fill="#ccc">FINALE:</text>
  <text x="675" y="765" font-size="10" fill="#afa">FPC display ricollegato → test</text>
</svg>