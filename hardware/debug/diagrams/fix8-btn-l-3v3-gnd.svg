<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="monospace">
  <rect width="1000" height="800" fill="#0d1117"/>
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#ff8844">FIX 8 — BTN_L bridge +3V3-GND [HIGH]</text>
  <text x="500" y="50" text-anchor="middle" font-size="13" fill="#aaa">B.Cu — trace verticale x=72.5mm — 4 tagli + ponticello + via GND extra</text>

  <!-- Legend -->
  <rect x="20" y="65" width="220" height="140" rx="6" fill="#161b22" stroke="#333"/>
  <text x="30" y="85" font-size="12" font-weight="bold" fill="#ccc">LEGENDA NET:</text>
  <rect x="30" y="95" width="40" height="8" fill="#44aaff" rx="2"/><text x="80" y="103" font-size="11" fill="#88ccff">+3V3</text>
  <rect x="30" y="115" width="40" height="8" fill="#44ff44" rx="2"/><text x="80" y="123" font-size="11" fill="#88ff88">GND</text>
  <rect x="30" y="135" width="40" height="8" fill="#cc88ff" rx="2"/><text x="80" y="143" font-size="11" fill="#ddaaff">BTN_L (segnale)</text>
  <rect x="30" y="155" width="12" height="12" fill="#ff0" opacity="0.5"/><text x="50" y="166" font-size="11" fill="#ff0">TAGLIO</text>
  <rect x="30" y="175" width="40" height="4" fill="#00ffaa" rx="1"/><text x="80" y="180" font-size="11" fill="#00ffaa">Ponticello AWG30</text>

  <!-- BEFORE -->
  <rect x="30" y="210" width="450" height="550" rx="8" fill="#1a1a2e" stroke="#c44" stroke-width="2"/>
  <text x="255" y="235" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff4444">PRIMA — B.Cu, x=72.5mm</text>
  <text x="255" y="253" text-anchor="middle" font-size="11" fill="#888">BTN_L ha 3 via di overlap (2 principali + 1 extra)</text>

  <rect x="250" y="280" width="7" height="440" fill="#cc88ff" opacity="0.9" rx="1"/>
  <text x="230" y="300" text-anchor="end" font-size="10" fill="#ddaaff">BTN_L</text>
  <text x="230" y="312" text-anchor="end" font-size="9" fill="#ddaaff">w=0.25mm</text>

  <!-- +3V3 via -->
  <circle cx="253" cy="380" r="22" fill="none" stroke="#44aaff" stroke-width="4"/>
  <circle cx="253" cy="380" r="5" fill="#44aaff"/>
  <text x="290" y="375" font-size="11" font-weight="bold" fill="#44aaff">Via +3V3</text>
  <text x="290" y="388" font-size="9" fill="#44aaff">(72.05, 44.60)</text>
  <rect x="240" y="365" width="26" height="30" fill="#ff0" opacity="0.3"/>

  <!-- GND via -->
  <circle cx="253" cy="490" r="22" fill="none" stroke="#44ff44" stroke-width="4"/>
  <circle cx="253" cy="490" r="5" fill="#44ff44"/>
  <text x="290" y="485" font-size="11" font-weight="bold" fill="#44ff44">Via GND</text>
  <text x="290" y="498" font-size="9" fill="#44ff44">(72.05, 52.00)</text>
  <rect x="240" y="475" width="26" height="30" fill="#ff0" opacity="0.3"/>

  <!-- GND EXTRA via -->
  <circle cx="270" cy="630" r="18" fill="none" stroke="#44ff44" stroke-width="3"/>
  <circle cx="270" cy="630" r="4" fill="#44ff44"/>
  <text x="300" y="625" font-size="10" font-weight="bold" fill="#ff8844">Via GND EXTRA</text>
  <text x="300" y="638" font-size="9" fill="#ff8844">(73.05, 65.50)</text>
  <text x="300" y="651" font-size="9" fill="#ff8844">overlap -0.025mm</text>
  <rect x="253" y="618" width="20" height="24" fill="#ff0" opacity="0.2"/>

  <text x="253" y="285" text-anchor="middle" font-size="10" fill="#888">verso ESP32</text>
  <text x="253" y="720" text-anchor="middle" font-size="10" fill="#888">verso bottone L</text>
  <text x="255" y="740" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff0">+3V3 &lt;-- rame --&gt; GND = BRIDGE!</text>

  <!-- AFTER -->
  <rect x="520" y="210" width="460" height="550" rx="8" fill="#1a1a2e" stroke="#4a4" stroke-width="2"/>
  <text x="750" y="235" text-anchor="middle" font-size="16" font-weight="bold" fill="#44ff44">DOPO — 4 tagli + ponticello + raschiatura extra</text>

  <rect x="740" y="280" width="7" height="70" fill="#cc88ff" opacity="0.9" rx="1"/>
  <text x="770" y="300" font-size="10" fill="#ddaaff">ATTIVO</text>

  <rect x="730" y="350" width="27" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="358" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">A y=44.0</text>

  <circle cx="743" cy="380" r="22" fill="none" stroke="#44aaff" stroke-width="4" stroke-dasharray="6,3"/>
  <circle cx="743" cy="380" r="5" fill="#44aaff"/>
  <text x="780" y="380" font-size="10" fill="#44aaff">+3V3 ISOLATA</text>

  <rect x="730" y="407" width="27" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="415" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">B y=45.2</text>

  <rect x="740" y="417" width="7" height="60" fill="#cc88ff" opacity="0.15" rx="1"/>
  <text x="770" y="450" font-size="9" fill="#555">MORTO</text>

  <rect x="730" y="477" width="27" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="485" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">C y=51.4</text>

  <circle cx="743" cy="507" r="22" fill="none" stroke="#44ff44" stroke-width="4" stroke-dasharray="6,3"/>
  <circle cx="743" cy="507" r="5" fill="#44ff44"/>
  <text x="780" y="507" font-size="10" fill="#44ff44">GND ISOLATA</text>

  <rect x="730" y="533" width="27" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="541" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">D y=52.6</text>

  <rect x="740" y="545" width="7" height="120" fill="#cc88ff" opacity="0.9" rx="1"/>
  <text x="770" y="580" font-size="10" fill="#ddaaff">ATTIVO</text>

  <!-- GND EXTRA - scrape needed -->
  <circle cx="760" cy="650" r="18" fill="none" stroke="#44ff44" stroke-width="3" stroke-dasharray="4,3"/>
  <circle cx="760" cy="650" r="4" fill="#44ff44"/>
  <rect x="745" y="640" width="30" height="20" fill="#556b2f" opacity="0.5" stroke="#8fbc8f" stroke-width="1"/>
  <text x="800" y="645" font-size="10" font-weight="bold" fill="#ff8844">GND EXTRA</text>
  <text x="800" y="658" font-size="9" fill="#ff8844">raschia ~0.5mm</text>
  <text x="800" y="671" font-size="9" fill="#ff8844">se multimetro da</text>
  <text x="800" y="684" font-size="9" fill="#ff8844">continuita</text>

  <!-- Jumper wire -->
  <path d="M743,350 Q700,350 700,310 Q700,280 680,280 L680,550 Q680,570 700,570 Q720,570 743,545" fill="none" stroke="#00ffaa" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="660" y="430" text-anchor="end" font-size="11" font-weight="bold" fill="#00ffaa">PONTICELLO</text>
  <text x="660" y="445" text-anchor="end" font-size="9" fill="#00ffaa">sopra A → sotto D</text>

  <rect x="520" y="710" width="460" height="45" rx="6" fill="#2a1a1a" stroke="#c44"/>
  <text x="750" y="728" text-anchor="middle" font-size="11" fill="#faa">Verifica: +3V3 (C2+) vs GND (C2-) = APERTA</text>
  <text x="750" y="743" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44">Se GND extra da continuita → raschiare anche quella</text>
</svg>