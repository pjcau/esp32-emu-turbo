<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="monospace">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#4a4" stroke-width="1.5"/>
    </pattern>
    <pattern id="copper" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#b87333"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">C19 Via-to-VBUS Short — Layer View (BEFORE Rework)</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#888">PCB 4-layer cross-section at C19 vias</text>

  <!-- ============ F.Cu Layer ============ -->
  <rect x="50" y="80" width="800" height="120" rx="5" fill="#1a1a2e" stroke="#c44" stroke-width="2"/>
  <text x="60" y="100" font-size="14" font-weight="bold" fill="#ff6b6b">F.Cu (Top — Display side)</text>

  <!-- VBUS horizontal trace -->
  <rect x="100" y="145" width="350" height="12" fill="#ff4444" opacity="0.9" rx="2"/>
  <text x="275" y="140" text-anchor="middle" font-size="11" fill="#ff8888">VBUS horizontal trace (0.5mm)</text>

  <!-- VBUS vertical trace -->
  <rect x="444" y="95" width="12" height="100" fill="#ff4444" opacity="0.9" rx="2"/>
  <text x="480" y="110" font-size="11" fill="#ff8888">VBUS vertical</text>

  <!-- GND via on F.Cu - overlapping -->
  <circle cx="380" cy="155" r="16" fill="none" stroke="#44ff44" stroke-width="3"/>
  <circle cx="380" cy="155" r="4" fill="#44ff44"/>
  <text x="380" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff0">Via 1 GND</text>

  <!-- Overlap indicator GND -->
  <rect x="366" y="145" width="28" height="12" fill="#ff0" opacity="0.5"/>
  <text x="420" y="175" font-size="10" fill="#ff0">⚡ OVERLAP 0.2mm</text>

  <!-- +5V via on F.Cu - overlapping -->
  <circle cx="450" cy="130" r="16" fill="none" stroke="#4488ff" stroke-width="3"/>
  <circle cx="450" cy="130" r="4" fill="#4488ff"/>
  <text x="500" y="135" font-size="11" font-weight="bold" fill="#ff0">Via 2 +5V</text>

  <!-- Overlap indicator +5V -->
  <rect x="444" y="118" width="12" height="28" fill="#ff0" opacity="0.5"/>
  <text x="530" y="150" font-size="10" fill="#ff0">⚡ OVERLAP 0.2mm</text>

  <!-- Short path -->
  <path d="M380,155 L450,130" stroke="#ff0" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="700" y="120" font-size="12" font-weight="bold" fill="#ff4444">GND ⚡ VBUS ⚡ +5V</text>
  <text x="700" y="138" font-size="11" fill="#ff8888">= TOTAL SHORT</text>

  <!-- ============ In1.Cu Layer (GND) ============ -->
  <rect x="50" y="210" width="800" height="100" rx="5" fill="#0a2a0a" stroke="#4a4" stroke-width="2"/>
  <text x="60" y="230" font-size="14" font-weight="bold" fill="#44ff44">In1.Cu (GND Plane)</text>

  <!-- GND copper fill -->
  <rect x="80" y="240" width="740" height="50" fill="url(#hatch)" opacity="0.3"/>
  <rect x="80" y="240" width="740" height="50" fill="#1a4a1a" opacity="0.5"/>

  <!-- GND via connected -->
  <circle cx="380" cy="265" r="14" fill="#44ff44" opacity="0.8"/>
  <circle cx="380" cy="265" r="4" fill="#fff"/>
  <text x="380" y="300" text-anchor="middle" font-size="10" fill="#44ff44">● CONNECTED to GND ✓</text>

  <!-- +5V via isolated (thermal relief) -->
  <circle cx="450" cy="265" r="14" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="450" cy="265" r="4" fill="#666"/>
  <text x="450" y="300" text-anchor="middle" font-size="10" fill="#888">○ thermal relief (isolated)</text>

  <!-- ============ In2.Cu Layer (+5V) ============ -->
  <rect x="50" y="320" width="800" height="100" rx="5" fill="#0a0a2e" stroke="#44f" stroke-width="2"/>
  <text x="60" y="340" font-size="14" font-weight="bold" fill="#4488ff">In2.Cu (+5V Plane)</text>

  <!-- +5V copper fill -->
  <rect x="80" y="350" width="740" height="50" fill="#1a1a4a" opacity="0.5"/>

  <!-- +5V via connected -->
  <circle cx="450" cy="375" r="14" fill="#4488ff" opacity="0.8"/>
  <circle cx="450" cy="375" r="4" fill="#fff"/>
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#4488ff">● CONNECTED to +5V ✓</text>

  <!-- GND via isolated -->
  <circle cx="380" cy="375" r="14" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="380" cy="375" r="4" fill="#666"/>
  <text x="380" y="410" text-anchor="middle" font-size="10" fill="#888">○ thermal relief (isolated)</text>

  <!-- ============ B.Cu Layer ============ -->
  <rect x="50" y="430" width="800" height="120" rx="5" fill="#1a1a2e" stroke="#c84" stroke-width="2"/>
  <text x="60" y="450" font-size="14" font-weight="bold" fill="#ffaa44">B.Cu (Bottom — ESP32 side)</text>

  <!-- C19 capacitor -->
  <rect x="350" y="475" width="130" height="40" fill="#665533" stroke="#aa8844" stroke-width="2" rx="3"/>
  <text x="415" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffcc66">C19 (1206)</text>

  <!-- C19 pad GND -->
  <rect x="330" y="480" width="25" height="30" fill="#44ff44" opacity="0.7" rx="2"/>
  <text x="342" y="530" text-anchor="middle" font-size="10" fill="#44ff44">GND pad</text>

  <!-- C19 pad +5V -->
  <rect x="475" y="480" width="25" height="30" fill="#4488ff" opacity="0.7" rx="2"/>
  <text x="487" y="530" text-anchor="middle" font-size="10" fill="#4488ff">+5V pad</text>

  <!-- Traces to vias -->
  <line x1="342" y1="480" x2="380" y2="460" stroke="#44ff44" stroke-width="2"/>
  <line x1="487" y1="480" x2="450" y2="460" stroke="#4488ff" stroke-width="2"/>

  <!-- Via barrels (vertical connections) -->
  <line x1="380" y1="155" x2="380" y2="495" stroke="#44ff44" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="450" y1="130" x2="450" y2="495" stroke="#4488ff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Via barrel labels -->
  <text x="365" y="220" font-size="9" fill="#44ff44" transform="rotate(-90,365,220)">via barrel</text>
  <text x="465" y="330" font-size="9" fill="#4488ff" transform="rotate(-90,465,330)">via barrel</text>

  <!-- ============ Legend ============ -->
  <rect x="50" y="570" width="800" height="120" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="60" y="595" font-size="13" font-weight="bold" fill="#fff">Short Circuit Path:</text>

  <!-- Path diagram -->
  <text x="80" y="620" font-size="12" fill="#ffaa44">C19 GND pad (B.Cu)</text>
  <text x="260" y="620" font-size="12" fill="#888">→ via barrel →</text>
  <text x="400" y="620" font-size="12" fill="#44ff44">In1.Cu GND plane</text>
  <text x="80" y="645" font-size="12" fill="#44ff44">GND via ring (F.Cu)</text>
  <text x="280" y="645" font-size="14" font-weight="bold" fill="#ff0">⚡ touches ⚡</text>
  <text x="440" y="645" font-size="12" fill="#ff4444">VBUS trace (F.Cu)</text>
  <text x="600" y="645" font-size="14" font-weight="bold" fill="#ff0">⚡ touches ⚡</text>
  <text x="720" y="645" font-size="12" fill="#4488ff">+5V via ring</text>

  <text x="80" y="675" font-size="12" font-weight="bold" fill="#ff4444">Result: GND = VBUS = +5V → all power rails shorted → board dead</text>
</svg>