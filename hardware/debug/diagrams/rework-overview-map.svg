  <circle cx="525" cy="582" r="6" fill="none" stroke="#44ff44" stroke-width="2"/>
  <line x1="525" y1="531" x2="525" y2="588" stroke="#ff9944" stroke-width="1" opacity="0.5"/>
  <circle cx="525" cy="560" r="9" fill="#ff8800"/>
  <text x="525" y="564" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">5</text>

