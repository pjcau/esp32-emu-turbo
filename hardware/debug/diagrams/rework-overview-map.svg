  <circle cx="435" cy="537" r="6" fill="none" stroke="#44aaff" stroke-width="2"/>
  <circle cx="435" cy="582" r="6" fill="none" stroke="#44ff44" stroke-width="2"/>
  <line x1="435" y1="531" x2="435" y2="588" stroke="#ff6666" stroke-width="1" opacity="0.5"/>
  <circle cx="435" cy="560" r="9" fill="#ff8800"/>
  <text x="435" y="564" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">7</text>

