  <circle cx="555" cy="582" r="6" fill="none" stroke="#44ff44" stroke-width="2"/>
  <line x1="555" y1="531" x2="555" y2="588" stroke="#cc88ff" stroke-width="1" opacity="0.5"/>
  <circle cx="555" cy="560" r="9" fill="#ff8800"/>
  <text x="555" y="564" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">8</text>

