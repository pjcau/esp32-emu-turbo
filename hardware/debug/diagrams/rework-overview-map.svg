  <!-- ========== BOTTOM INFO ========== -->
  <rect x="20" y="740" width="1160" height="145" rx="8" fill="#161b22" stroke="#555"/>

  <text x="40" y="765" font-size="14" font-weight="bold" fill="#ff2222">ORDINE DI LAVORO:</text>
  <text x="40" y="790" font-size="12" fill="#ff6666">1. FIX 3 (CRITICO) → taglia LCD_RST a x=95 y=33 su F.Cu → verifica VBUS-GND aperta</text>
  <text x="40" y="810" font-size="12" fill="#ffaa44">2. FIX 4-8 (HIGH) → 4 tagli + ponticello ciascuno su B.Cu → verifica +3V3-GND aperta</text>
  <text x="40" y="830" font-size="12" fill="#ffee44">3. FIX 9-27 (MEDIUM) → raschiatura singola F.Cu/B.Cu → verifica segnali isolati</text>
  <text x="40" y="850" font-size="12" fill="#999">4. FIX 28-38 (OPT) → solo se multimetro da continuita chiusa</text>
  <text x="40" y="875" font-size="12" font-weight="bold" fill="#4f4">5. TEST: accensione con limite 100mA → corrente &lt;50mA → tensioni OK → segnali OK</text>

  <!-- Net summary -->
  <text x="750" y="765" font-size="12" font-weight="bold" fill="#ccc">NET COINVOLTE:</text>
  <text x="750" y="785" font-size="11" fill="#ff8888">VBUS (5V USB): FIX 1,2,3,27</text>
  <text x="750" y="802" font-size="11" fill="#ffaa44">+5V: FIX 2</text>
  <text x="750" y="819" font-size="11" fill="#88ccff">+3V3: FIX 4-9,12-13,20-22,24,26</text>
  <text x="750" y="836" font-size="11" fill="#88ff88">GND: FIX 1,3-8,10-11,14-19,23,25,28-38</text>
