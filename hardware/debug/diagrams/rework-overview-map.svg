  <text x="280" y="265" font-size="9" fill="#555">x=25</text>
  <text x="480" y="265" font-size="9" fill="#555">x=60</text>
  <text x="600" y="265" font-size="9" fill="#555">x=80</text>
  <text x="780" y="265" font-size="9" fill="#555">x=110</text>
  <text x="900" y="265" font-size="9" fill="#555">x=130</text>
  <text x="1020" y="265" font-size="9" fill="#555">x=150</text>
