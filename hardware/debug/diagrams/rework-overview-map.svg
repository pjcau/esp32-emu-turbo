<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="monospace">
  <rect width="1200" height="900" fill="#0d1117"/>

  <text x="600" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#fff">PCB v1 — MAPPA COMPLETA REWORK (160x75mm)</text>
  <text x="600" y="52" text-anchor="middle" font-size="13" fill="#aaa">44 violazioni: 3 critiche (rosso), 5 high (arancione), 19 medium (giallo), 11 opzionali (grigio)</text>

  <!-- Legend -->
  <rect x="20" y="65" width="280" height="180" rx="6" fill="#161b22" stroke="#333"/>
  <text x="30" y="85" font-size="13" font-weight="bold" fill="#ccc">LEGENDA:</text>
  <circle cx="45" cy="105" r="8" fill="#ff2222"/><text x="60" y="109" font-size="11" fill="#ff6666">FIX 1-3: CRITICO (VBUS-GND bridge)</text>
  <circle cx="45" cy="125" r="8" fill="#ff8800"/><text x="60" y="129" font-size="11" fill="#ffaa44">FIX 4-8: HIGH (+3V3-GND bridge, 4 tagli)</text>
  <circle cx="45" cy="145" r="8" fill="#ffcc00"/><text x="60" y="149" font-size="11" fill="#ffee44">FIX 9-27: MEDIUM (raschiatura singola)</text>
  <circle cx="45" cy="165" r="8" fill="#666"/><text x="60" y="169" font-size="11" fill="#999">FIX 28-38: OPZIONALE (misurare prima)</text>
  <rect x="30" y="180" width="15" height="8" fill="#ff4444" rx="2"/><text x="55" y="188" font-size="11" fill="#ff8888">VBUS (5V)</text>
  <rect x="130" y="180" width="15" height="8" fill="#44aaff" rx="2"/><text x="155" y="188" font-size="11" fill="#88ccff">+3V3</text>
  <rect x="30" y="198" width="15" height="8" fill="#44ff44" rx="2"/><text x="55" y="206" font-size="11" fill="#88ff88">GND</text>
  <rect x="130" y="198" width="15" height="8" fill="#ff8800" rx="2"/><text x="155" y="206" font-size="11" fill="#ffaa44">+5V</text>
  <text x="30" y="230" font-size="10" fill="#888">Scala: 1mm PCB = ~6px SVG</text>

  <!-- ========== PCB OUTLINE ========== -->
