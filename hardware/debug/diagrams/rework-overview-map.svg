  <!-- LCD_RST trace at y=33mm → y=468px, from x=79→x=120 → px 594→840 -->
  <line x1="610" y1="468" x2="786" y2="468" stroke="#ffaa00" stroke-width="2" opacity="0.5"/>
  <!-- GND via at (81.5, 33) -->
  <circle cx="609" cy="468" r="7" fill="none" stroke="#44ff44" stroke-width="2"/>
  <!-- VBUS via at (110.95, 33) -->
  <circle cx="786" cy="468" r="7" fill="none" stroke="#ff4444" stroke-width="2"/>
  <!-- Cut point at x=95 -->
  <circle cx="690" cy="468" r="10" fill="#ff2222"/>
  <text x="690" y="472" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">3</text>
  <text x="690" y="458" text-anchor="middle" font-size="8" fill="#ff4444">TAGLIA</text>

