<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="monospace">

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Power Path — VBUS vs +5V vs +3V3</text>
  <text x="450" y="50" text-anchor="middle" font-size="13" fill="#888">Why Via 1 (GND-VBUS) is catastrophic and Via 2 (+5V-VBUS) bypasses protection</text>

  <!-- ============ CORRECT PATH (top) ============ -->
  <rect x="30" y="65" width="840" height="140" rx="8" fill="#0a2a0a" stroke="#4a4" stroke-width="2"/>
  <text x="50" y="90" font-size="14" font-weight="bold" fill="#44ff44">CORRECT Power Path (after rework)</text>

  <!-- USB-C -->
  <rect x="60" y="110" width="100" height="50" rx="8" fill="#333" stroke="#888" stroke-width="2"/>
  <text x="110" y="132" text-anchor="middle" font-size="11" fill="#fff">USB-C</text>
  <text x="110" y="147" text-anchor="middle" font-size="10" fill="#ff8888">VBUS ~5V</text>

  <!-- Arrow -->
  <line x1="160" y1="135" x2="210" y2="135" stroke="#ff4444" stroke-width="3" marker-end="url(#arrow-red)"/>
  <defs><marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff4444"/></marker></defs>
  <text x="185" y="125" text-anchor="middle" font-size="9" fill="#ff8888">VBUS</text>

  <!-- IP5306 -->
  <rect x="210" y="105" width="130" height="60" rx="8" fill="#2a2a0a" stroke="#ffaa44" stroke-width="2"/>
  <text x="275" y="128" text-anchor="middle" font-size="11" fill="#ffcc66">IP5306</text>
  <text x="275" y="143" text-anchor="middle" font-size="9" fill="#ffaa44">charge + boost</text>
  <text x="275" y="158" text-anchor="middle" font-size="9" fill="#ffaa44">charge-and-play</text>

  <!-- Battery connection -->
  <rect x="235" y="170" width="80" height="28" rx="5" fill="#553" stroke="#aa8" stroke-width="1"/>
  <text x="275" y="188" text-anchor="middle" font-size="9" fill="#ffcc66">LiPo 3.7V</text>
  <line x1="275" y1="165" x2="275" y2="170" stroke="#ffaa44" stroke-width="2"/>
  <text x="320" y="183" font-size="8" fill="#aa8">BAT+</text>

  <!-- Arrow IP5306 to +5V -->
  <line x1="340" y1="135" x2="400" y2="135" stroke="#4488ff" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <defs><marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4488ff"/></marker></defs>
  <text x="370" y="125" text-anchor="middle" font-size="9" fill="#4488ff">+5V</text>

  <!-- C19 on +5V rail -->
  <rect x="400" y="115" width="60" height="40" rx="5" fill="#335" stroke="#4488ff" stroke-width="1"/>
  <text x="430" y="133" text-anchor="middle" font-size="9" fill="#88aaff">C19</text>
  <text x="430" y="147" text-anchor="middle" font-size="8" fill="#668">bypass</text>

  <!-- Arrow to AMS1117 -->
  <line x1="460" y1="135" x2="530" y2="135" stroke="#4488ff" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="495" y="125" text-anchor="middle" font-size="9" fill="#4488ff">+5V</text>

  <!-- AMS1117 -->
  <rect x="530" y="105" width="120" height="60" rx="8" fill="#0a2a2a" stroke="#44dddd" stroke-width="2"/>
  <text x="590" y="128" text-anchor="middle" font-size="11" fill="#44dddd">AMS1117</text>
  <text x="590" y="143" text-anchor="middle" font-size="9" fill="#44dddd">5V → 3.3V</text>
  <text x="590" y="158" text-anchor="middle" font-size="9" fill="#44dddd">LDO regulator</text>

  <!-- Arrow to +3V3 -->
  <line x1="650" y1="135" x2="710" y2="135" stroke="#44dddd" stroke-width="3" marker-end="url(#arrow-cyan)"/>
  <defs><marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#44dddd"/></marker></defs>
  <text x="680" y="125" text-anchor="middle" font-size="9" fill="#44dddd">+3V3</text>

  <!-- ESP32 -->
  <rect x="710" y="105" width="130" height="60" rx="8" fill="#1a1a3a" stroke="#8888ff" stroke-width="2"/>
  <text x="775" y="128" text-anchor="middle" font-size="11" fill="#aaaaff">ESP32-S3</text>
  <text x="775" y="143" text-anchor="middle" font-size="9" fill="#8888ff">+ LCD, SD</text>
  <text x="775" y="158" text-anchor="middle" font-size="9" fill="#8888ff">+ Audio, Buttons</text>

  <!-- ============ VIA 1 SHORT (catastrophic) ============ -->
  <rect x="30" y="220" width="840" height="120" rx="8" fill="#2a0a0a" stroke="#ff4444" stroke-width="2"/>
  <text x="50" y="245" font-size="14" font-weight="bold" fill="#ff4444">VIA 1: GND ⚡ VBUS = CATASTROPHIC (board dead)</text>

  <!-- Short path diagram -->
  <rect x="60" y="260" width="100" height="40" rx="5" fill="#333" stroke="#888" stroke-width="1"/>
  <text x="110" y="278" text-anchor="middle" font-size="10" fill="#ff8888">VBUS ~5V</text>
  <text x="110" y="293" text-anchor="middle" font-size="9" fill="#888">from USB</text>

  <!-- Lightning bolt -->
  <text x="195" y="285" text-anchor="middle" font-size="24" fill="#ff0">⚡</text>

  <rect x="230" y="260" width="100" height="40" rx="5" fill="#1a3a1a" stroke="#44ff44" stroke-width="1"/>
  <text x="280" y="278" text-anchor="middle" font-size="10" fill="#44ff44">GND (0V)</text>
  <text x="280" y="293" text-anchor="middle" font-size="9" fill="#888">via C19</text>

  <text x="365" y="278" font-size="11" fill="#ff8888">→ 5V directly to ground = infinite current</text>
  <text x="365" y="295" font-size="11" fill="#ff8888">→ USB protection shuts down</text>
  <text x="365" y="312" font-size="11" fill="#ff8888">→ ALL power rails dragged to 0V → nothing works</text>

  <!-- ============ VIA 2 SHORT (bypass) ============ -->
  <rect x="30" y="355" width="840" height="120" rx="8" fill="#2a2a0a" stroke="#ffaa44" stroke-width="2"/>
  <text x="50" y="380" font-size="14" font-weight="bold" fill="#ffaa44">VIA 2: +5V ⚡ VBUS = BYPASS (IP5306 skipped)</text>

  <!-- Short path diagram -->
  <rect x="60" y="395" width="100" height="40" rx="5" fill="#333" stroke="#888" stroke-width="1"/>
  <text x="110" y="413" text-anchor="middle" font-size="10" fill="#ff8888">VBUS ~5V</text>
  <text x="110" y="428" text-anchor="middle" font-size="9" fill="#888">from USB</text>

  <!-- Lightning bolt -->
  <text x="195" y="420" text-anchor="middle" font-size="24" fill="#ff0">⚡</text>

  <rect x="230" y="395" width="100" height="40" rx="5" fill="#335" stroke="#4488ff" stroke-width="1"/>
  <text x="280" y="413" text-anchor="middle" font-size="10" fill="#4488ff">+5V rail</text>
  <text x="280" y="428" text-anchor="middle" font-size="9" fill="#888">via C19</text>

  <text x="365" y="408" font-size="11" fill="#ffaa44">→ USB feeds +5V rail directly (skips IP5306)</text>
  <text x="365" y="425" font-size="11" fill="#ffaa44">→ Board "works" but no charge management</text>
  <text x="365" y="442" font-size="11" fill="#ffaa44">→ Battery could back-feed USB port = damage risk</text>
  <text x="365" y="459" font-size="11" fill="#ff8888">→ Must also fix for safe battery operation</text>
</svg>