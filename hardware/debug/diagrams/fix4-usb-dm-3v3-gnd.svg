<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="monospace">
  <rect width="1000" height="750" fill="#0d1117"/>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#ff8844">FIX 4 — USB_D- bridge +3V3-GND [HIGH]</text>
  <text x="500" y="50" text-anchor="middle" font-size="13" fill="#aaa">B.Cu — trace verticale x=91.7mm — 4 tagli + ponticello AWG30</text>

  <!-- Legend -->
  <rect x="20" y="65" width="220" height="140" rx="6" fill="#161b22" stroke="#333"/>
  <text x="30" y="85" font-size="12" font-weight="bold" fill="#ccc">LEGENDA NET:</text>
  <rect x="30" y="95" width="40" height="8" fill="#44aaff" rx="2"/><text x="80" y="103" font-size="11" fill="#88ccff">+3V3</text>
  <rect x="30" y="115" width="40" height="8" fill="#44ff44" rx="2"/><text x="80" y="123" font-size="11" fill="#88ff88">GND</text>
  <rect x="30" y="135" width="40" height="8" fill="#ff44ff" rx="2"/><text x="80" y="143" font-size="11" fill="#ff88ff">USB_D- (segnale)</text>
  <rect x="30" y="155" width="12" height="12" fill="#ff0" opacity="0.5"/><text x="50" y="166" font-size="11" fill="#ff0">TAGLIO</text>
  <rect x="30" y="175" width="40" height="4" fill="#00ffaa" rx="1"/><text x="80" y="180" font-size="11" fill="#00ffaa">Ponticello AWG30</text>

  <!-- ======= BEFORE ======= -->
  <rect x="30" y="210" width="450" height="500" rx="8" fill="#1a1a2e" stroke="#c44" stroke-width="2"/>
  <text x="255" y="235" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff4444">PRIMA — B.Cu, x=91.7mm</text>
  <text x="255" y="252" text-anchor="middle" font-size="11" fill="#888">La trace USB_D- tocca ENTRAMBE le via</text>

  <!-- USB_D- vertical trace -->
  <rect x="250" y="270" width="6" height="400" fill="#ff44ff" opacity="0.9" rx="1"/>
  <text x="230" y="290" text-anchor="end" font-size="10" fill="#ff88ff">USB_D-</text>
  <text x="230" y="302" text-anchor="end" font-size="9" fill="#ff88ff">w=0.2mm</text>

  <!-- +3V3 via at y=44.6 -->
  <circle cx="253" cy="370" r="22" fill="none" stroke="#44aaff" stroke-width="4"/>
  <circle cx="253" cy="370" r="5" fill="#44aaff"/>
  <text x="290" y="365" font-size="11" font-weight="bold" fill="#44aaff">Via +3V3</text>
  <text x="290" y="378" font-size="9" fill="#44aaff">(92.05, 44.60)</text>
  <rect x="240" y="355" width="26" height="30" fill="#ff0" opacity="0.3"/>

  <!-- GND via at y=52.0 -->
  <circle cx="253" cy="500" r="22" fill="none" stroke="#44ff44" stroke-width="4"/>
  <circle cx="253" cy="500" r="5" fill="#44ff44"/>
  <text x="290" y="495" font-size="11" font-weight="bold" fill="#44ff44">Via GND</text>
  <text x="290" y="508" font-size="9" fill="#44ff44">(92.05, 52.00)</text>
  <rect x="240" y="485" width="26" height="30" fill="#ff0" opacity="0.3"/>

  <!-- Short path -->
  <text x="255" y="440" text-anchor="middle" font-size="10" fill="#ff0">rame USB_D-</text>
  <text x="255" y="680" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff0">+3V3 &lt;-- rame --&gt; GND = BRIDGE!</text>

  <!-- Labels -->
  <text x="253" y="280" text-anchor="middle" font-size="10" fill="#888">verso ESP32</text>
  <text x="253" y="665" text-anchor="middle" font-size="10" fill="#888">verso USB-C</text>

  <!-- ======= AFTER ======= -->
  <rect x="520" y="210" width="460" height="500" rx="8" fill="#1a1a2e" stroke="#4a4" stroke-width="2"/>
  <text x="750" y="235" text-anchor="middle" font-size="16" font-weight="bold" fill="#44ff44">DOPO — 4 tagli + ponticello</text>

  <!-- USB_D- top segment (active) -->
  <rect x="740" y="270" width="6" height="70" fill="#ff44ff" opacity="0.9" rx="1"/>
  <text x="770" y="290" font-size="10" fill="#ff88ff">ATTIVO</text>
  <text x="770" y="302" font-size="9" fill="#888">(verso ESP32)</text>

  <!-- Cut A at y=44.0 -->
  <rect x="730" y="340" width="26" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="348" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">A</text>
  <text x="695" y="360" text-anchor="end" font-size="9" fill="#ff0">y=44.0</text>

  <!-- +3V3 via ISOLATED -->
  <circle cx="743" cy="370" r="22" fill="none" stroke="#44aaff" stroke-width="4" stroke-dasharray="6,3"/>
  <circle cx="743" cy="370" r="5" fill="#44aaff"/>
  <text x="780" y="365" font-size="10" fill="#44aaff">+3V3</text>
  <text x="780" y="377" font-size="9" fill="#44aaff">ISOLATA</text>

  <!-- Cut B at y=45.2 -->
  <rect x="730" y="397" width="26" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="405" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">B</text>
  <text x="695" y="417" text-anchor="end" font-size="9" fill="#ff0">y=45.2</text>

  <!-- Dead segment -->
  <rect x="740" y="407" width="6" height="80" fill="#ff44ff" opacity="0.2" rx="1"/>
  <text x="770" y="445" font-size="9" fill="#666">MORTO</text>
  <text x="770" y="457" font-size="8" fill="#555">(rame isolato)</text>

  <!-- Cut C at y=51.4 -->
  <rect x="730" y="487" width="26" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="495" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">C</text>
  <text x="695" y="507" text-anchor="end" font-size="9" fill="#ff0">y=51.4</text>

  <!-- GND via ISOLATED -->
  <circle cx="743" cy="517" r="22" fill="none" stroke="#44ff44" stroke-width="4" stroke-dasharray="6,3"/>
  <circle cx="743" cy="517" r="5" fill="#44ff44"/>
  <text x="780" y="512" font-size="10" fill="#44ff44">GND</text>
  <text x="780" y="524" font-size="9" fill="#44ff44">ISOLATA</text>

  <!-- Cut D at y=52.6 -->
  <rect x="730" y="543" width="26" height="8" fill="#0d1117" stroke="#ff0" stroke-width="2"/>
  <text x="695" y="551" text-anchor="end" font-size="11" font-weight="bold" fill="#ff0">D</text>
  <text x="695" y="563" text-anchor="end" font-size="9" fill="#ff0">y=52.6</text>

  <!-- USB_D- bottom segment (active) -->
  <rect x="740" y="555" width="6" height="80" fill="#ff44ff" opacity="0.9" rx="1"/>
  <text x="770" y="600" font-size="10" fill="#ff88ff">ATTIVO</text>
  <text x="770" y="612" font-size="9" fill="#888">(verso USB-C)</text>

  <!-- Jumper wire -->
  <path d="M743,340 Q700,340 700,310 Q700,280 680,280 L680,560 Q680,590 700,590 Q720,590 743,555" fill="none" stroke="#00ffaa" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="660" y="440" text-anchor="end" font-size="11" font-weight="bold" fill="#00ffaa">PONTICELLO</text>
  <text x="660" y="455" text-anchor="end" font-size="9" fill="#00ffaa">AWG30 isolato</text>
  <text x="660" y="468" text-anchor="end" font-size="9" fill="#00ffaa">sopra A → sotto D</text>

  <!-- Verification -->
  <rect x="520" y="660" width="460" height="40" rx="6" fill="#2a1a1a" stroke="#c44"/>
  <text x="750" y="678" text-anchor="middle" font-size="11" fill="#faa">Verifica: C2 pad+ (+3V3) vs C2 pad- (GND)</text>
  <text x="750" y="693" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44">Atteso: &gt;1M ohm (APERTA)</text>
</svg>