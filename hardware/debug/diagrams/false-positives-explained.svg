<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" font-family="monospace">

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">137 "Violations" Explained — All False Positives</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#888">Old collision grid could not distinguish same-net from different-net</text>

  <!-- ============ REAL VIOLATION (2) ============ -->
  <rect x="30" y="75" width="840" height="170" rx="8" fill="#2a0a0a" stroke="#c44" stroke-width="2"/>
  <text x="50" y="100" font-size="15" font-weight="bold" fill="#ff4444">REAL Violations (2) — C19 vias overlap VBUS trace</text>

  <!-- Example: different net touching -->
  <rect x="60" y="115" width="370" height="110" rx="5" fill="#1a1a2e"/>
  <text x="245" y="135" text-anchor="middle" font-size="12" fill="#ff8888">DIFFERENT-NET contact = REAL SHORT</text>

  <!-- VBUS trace -->
  <rect x="90" y="155" width="300" height="10" fill="#ff4444" rx="2"/>
  <text x="240" y="152" text-anchor="middle" font-size="10" fill="#ff8888">VBUS net</text>

  <!-- GND via touching it -->
  <circle cx="200" cy="170" r="14" fill="none" stroke="#44ff44" stroke-width="3"/>
  <circle cx="200" cy="170" r="4" fill="#44ff44"/>
  <text x="200" y="205" text-anchor="middle" font-size="10" fill="#44ff44">GND net</text>

  <!-- Overlap highlight -->
  <rect x="188" y="155" width="24" height="10" fill="#ff0" opacity="0.5"/>

  <!-- Arrow pointing to overlap -->
  <text x="260" y="178" font-size="11" font-weight="bold" fill="#ff0">VBUS != GND</text>
  <text x="260" y="193" font-size="11" fill="#ff4444">Different nets touch</text>
  <text x="260" y="208" font-size="11" fill="#ff4444">= REAL SHORT ⚡</text>

  <!-- Fixed label -->
  <rect x="460" y="115" width="390" height="110" rx="5" fill="#1a2a1a"/>
  <text x="655" y="135" text-anchor="middle" font-size="12" fill="#44ff44">FIXED: vias moved 0.8mm away</text>

  <!-- VBUS trace -->
  <rect x="490" y="155" width="300" height="10" fill="#ff4444" rx="2"/>
  <text x="640" y="152" text-anchor="middle" font-size="10" fill="#ff8888">VBUS net</text>

  <!-- GND via NOT touching -->
  <circle cx="580" cy="190" r="14" fill="none" stroke="#44ff44" stroke-width="3"/>
  <circle cx="580" cy="190" r="4" fill="#44ff44"/>
  <text x="580" y="218" text-anchor="middle" font-size="10" fill="#44ff44">GND net</text>

  <!-- Gap -->
  <line x1="580" y1="165" x2="580" y2="176" stroke="#8fbc8f" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="610" y="180" font-size="10" fill="#8fbc8f">0.8mm gap ✓</text>

  <text x="660" y="200" font-size="11" font-weight="bold" fill="#44ff44">New PCB: gap = 0.8mm</text>
  <text x="660" y="215" font-size="11" fill="#8fbc8f">Old PCB: rework scrape</text>

  <!-- ============ FALSE POSITIVE EXAMPLES ============ -->
  <rect x="30" y="260" width="840" height="520" rx="8" fill="#0a0a1a" stroke="#448" stroke-width="2"/>
  <text x="50" y="285" font-size="15" font-weight="bold" fill="#88aaff">FALSE POSITIVES (137) — Same-net connections flagged as "violations"</text>
  <text x="50" y="305" font-size="12" fill="#888">These are NORMAL connections — a trace MUST touch its own pad</text>

  <!-- Example 1: LCD trace to LCD pad -->
  <rect x="60" y="320" width="380" height="130" rx="5" fill="#1a1a2e"/>
  <text x="250" y="340" text-anchor="middle" font-size="12" fill="#88aaff">Example: LCD_D7 trace → LCD_D7 pad</text>

  <!-- Trace -->
  <rect x="100" y="365" width="200" height="8" fill="#88aaff" rx="2"/>
  <text x="200" y="360" text-anchor="middle" font-size="10" fill="#88aaff">LCD_D7 trace</text>

  <!-- Pad -->
  <rect x="290" y="355" width="30" height="28" fill="#88aaff" opacity="0.5" stroke="#88aaff" stroke-width="2" rx="3"/>
  <text x="305" y="400" text-anchor="middle" font-size="10" fill="#88aaff">LCD_D7 pad</text>

  <!-- Same net label -->
  <text x="120" y="415" font-size="11" fill="#44ff44">Same net: LCD_D7 = LCD_D7</text>
  <text x="120" y="432" font-size="11" fill="#44ff44">This is a CORRECT connection! ✓</text>

  <!-- Old script flag -->
  <rect x="108" y="438" width="310" height="18" fill="#440000" rx="3"/>
  <text x="120" y="452" font-size="10" fill="#ff8888">Old script: "VIOLATION! LCD_D7 overlaps pad" ✗ WRONG</text>

  <!-- Example 2: GND trace to GND via -->
  <rect x="460" y="320" width="390" height="130" rx="5" fill="#1a1a2e"/>
  <text x="655" y="340" text-anchor="middle" font-size="12" fill="#88aaff">Example: GND trace → GND via</text>

  <!-- Trace -->
  <rect x="500" y="365" width="180" height="8" fill="#44ff44" rx="2"/>
  <text x="590" y="360" text-anchor="middle" font-size="10" fill="#44ff44">GND trace</text>

  <!-- Via -->
  <circle cx="700" cy="370" r="14" fill="none" stroke="#44ff44" stroke-width="3"/>
  <circle cx="700" cy="370" r="4" fill="#44ff44"/>
  <text x="700" y="400" text-anchor="middle" font-size="10" fill="#44ff44">GND via</text>

  <!-- Same net label -->
  <text x="520" y="418" font-size="11" fill="#44ff44">Same net: GND = GND</text>
  <text x="520" y="435" font-size="11" fill="#44ff44">This is a CORRECT connection! ✓</text>

  <!-- Old script flag -->
  <rect x="508" y="438" width="320" height="18" fill="#440000" rx="3"/>
  <text x="520" y="452" font-size="10" fill="#ff8888">Old script: "VIOLATION! GND overlaps GND via" ✗ WRONG</text>

  <!-- Example 3: Button pull-up -->
  <rect x="60" y="470" width="380" height="130" rx="5" fill="#1a1a2e"/>
  <text x="250" y="490" text-anchor="middle" font-size="12" fill="#88aaff">Example: +3V3 to pull-up resistor pad</text>

  <!-- Trace -->
  <rect x="100" y="515" width="180" height="8" fill="#ffaa44" rx="2"/>
  <text x="190" y="510" text-anchor="middle" font-size="10" fill="#ffaa44">+3V3 trace</text>

  <!-- Resistor -->
  <rect x="280" y="505" width="40" height="28" fill="#664" stroke="#aa8" stroke-width="2" rx="3"/>
  <text x="300" y="523" text-anchor="middle" font-size="9" fill="#ffcc66">R</text>
  <text x="300" y="550" text-anchor="middle" font-size="10" fill="#ffaa44">pull-up pad (+3V3)</text>

  <text x="120" y="578" font-size="11" fill="#44ff44">Same net: +3V3 = +3V3 ✓</text>

  <rect x="108" y="582" width="310" height="18" fill="#440000" rx="3"/>
  <text x="120" y="596" font-size="10" fill="#ff8888">Old script: "VIOLATION! +3V3 overlaps BTN_SELECT" ✗</text>

  <!-- Example 4: SD card -->
  <rect x="460" y="470" width="390" height="130" rx="5" fill="#1a1a2e"/>
  <text x="655" y="490" text-anchor="middle" font-size="12" fill="#88aaff">Example: SD_MOSI to SD card pad</text>

  <!-- Trace -->
  <rect x="500" y="515" width="180" height="8" fill="#ff88ff" rx="2"/>
  <text x="590" y="510" text-anchor="middle" font-size="10" fill="#ff88ff">SD_MOSI trace</text>

  <!-- SD pad -->
  <rect x="680" y="505" width="40" height="28" fill="#ff88ff" opacity="0.3" stroke="#ff88ff" stroke-width="2" rx="3"/>
  <text x="700" y="550" text-anchor="middle" font-size="10" fill="#ff88ff">SD_MOSI pad</text>

  <text x="520" y="578" font-size="11" fill="#44ff44">Same net: SD_MOSI = SD_MOSI ✓</text>

  <rect x="508" y="582" width="320" height="18" fill="#440000" rx="3"/>
  <text x="520" y="596" font-size="10" fill="#ff8888">Old script: "VIOLATION! SD_MOSI overlaps GND" ✗</text>

  <!-- ============ Summary bar ============ -->
  <rect x="60" y="620" width="790" height="60" rx="5" fill="#0a2a0a" stroke="#4a4" stroke-width="2"/>

  <!-- Bar chart -->
  <rect x="80" y="635" width="20" height="30" fill="#ff4444" rx="2"/>
  <text x="90" y="680" text-anchor="middle" font-size="10" fill="#ff4444">2</text>
  <text x="110" y="655" font-size="11" fill="#ff8888">real</text>

  <rect x="160" y="635" width="600" height="30" fill="#448" opacity="0.5" rx="2"/>
  <text x="460" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#88aaff">137 false positives (same-net, not real shorts)</text>

  <!-- Conclusion -->
  <rect x="60" y="700" width="790" height="50" rx="5" fill="#1a2a1a" stroke="#4a4" stroke-width="2"/>
  <text x="450" y="722" text-anchor="middle" font-size="14" font-weight="bold" fill="#44ff44">New collision grid with net-awareness: 0 violations ✓</text>
  <text x="450" y="740" text-anchor="middle" font-size="12" fill="#8fbc8f">After C19 rework, ALL board functions should work: display, SD, audio, buttons, USB</text>
</svg>