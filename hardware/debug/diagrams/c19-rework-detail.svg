<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 850" font-family="monospace">

  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">C19 Rework Detail — WHERE to Scrape</text>
  <text x="475" y="55" text-anchor="middle" font-size="13" fill="#888">You scrape BETWEEN trace and via ring — NOT on the trace itself</text>

  <!-- ============ VIA 1 (GND) — BEFORE ============ -->
  <rect x="30" y="75" width="420" height="310" rx="8" fill="#1a1a2e" stroke="#c44" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff4444">VIA 1 (GND) — BEFORE</text>
  <text x="240" y="118" text-anchor="middle" font-size="11" fill="#888">F.Cu zoom view — the short</text>

  <!-- VBUS horizontal trace -->
  <rect x="60" y="160" width="370" height="20" fill="#ff4444" opacity="0.9" rx="2"/>
  <text x="245" y="155" text-anchor="middle" font-size="12" fill="#ff8888">VBUS trace (0.5mm wide)</text>

  <!-- GND via annular ring - overlapping the trace -->
  <circle cx="240" cy="215" r="35" fill="none" stroke="#44ff44" stroke-width="6"/>
  <circle cx="240" cy="215" r="6" fill="#44ff44"/>
  <text x="240" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#44ff44">GND via</text>
  <text x="240" y="280" text-anchor="middle" font-size="10" fill="#44ff44">annular ring r=0.45mm</text>

  <!-- Overlap zone highlighted -->
  <rect x="205" y="172" width="70" height="16" fill="#ff0" opacity="0.6"/>
  <text x="310" y="195" font-size="11" font-weight="bold" fill="#ff0">OVERLAP</text>
  <text x="310" y="210" font-size="11" fill="#ff0">0.2mm copper</text>
  <text x="310" y="225" font-size="11" fill="#ff0">contact here</text>
  <line x1="310" y1="195" x2="275" y2="185" stroke="#ff0" stroke-width="1"/>

  <!-- Labels for dimensions -->
  <line x1="60" y1="145" x2="430" y2="145" stroke="#888" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="60" y="142" font-size="9" fill="#888">trace top edge</text>
  <line x1="60" y1="182" x2="430" y2="182" stroke="#888" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="60" y="195" font-size="9" fill="#888">trace bottom edge</text>

  <!-- Via top edge -->
  <line x1="195" y1="180" x2="195" y2="190" stroke="#44ff44" stroke-width="0.5"/>
  <text x="140" y="190" font-size="9" fill="#44ff44">via ring top</text>

  <!-- Short path arrow -->
  <path d="M240,180 L240,172" stroke="#ff0" stroke-width="3" marker-end="url(#arr-y)"/>
  <defs><marker id="arr-y" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,10 L5,0 L10,10 z" fill="#ff0"/></marker></defs>

  <text x="240" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff4444">Result: GND = VBUS (short!)</text>

  <!-- ============ VIA 1 (GND) — AFTER ============ -->
  <rect x="500" y="75" width="420" height="310" rx="8" fill="#1a1a2e" stroke="#4a4" stroke-width="2"/>
  <text x="710" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#44ff44">VIA 1 (GND) — AFTER SCRAPING</text>
  <text x="710" y="118" text-anchor="middle" font-size="11" fill="#8fbc8f">F.Cu zoom — gap created</text>

  <!-- VBUS horizontal trace - INTACT -->
  <rect x="530" y="160" width="370" height="20" fill="#ff4444" opacity="0.9" rx="2"/>
  <text x="715" y="155" text-anchor="middle" font-size="12" fill="#ff8888">VBUS trace — INTACT, not touched!</text>

  <!-- Scraped zone - BETWEEN trace and via -->
  <rect x="670" y="183" width="80" height="12" fill="#556b2f" stroke="#8fbc8f" stroke-width="1" rx="1"/>
  <text x="710" y="192" text-anchor="middle" font-size="8" fill="#cfc">scraped</text>

  <!-- Arrow showing where to scrape -->
  <line x1="620" y1="220" x2="670" y2="195" stroke="#8fbc8f" stroke-width="2" marker-end="url(#arr-g)"/>
  <defs><marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8fbc8f"/></marker></defs>
  <text x="560" y="220" font-size="10" fill="#8fbc8f">SCRAPE</text>
  <text x="560" y="233" font-size="10" fill="#8fbc8f">HERE</text>
  <text x="560" y="246" font-size="10" fill="#8fbc8f">(only 0.3mm</text>
  <text x="560" y="259" font-size="10" fill="#8fbc8f">strip)</text>

  <!-- GND via annular ring - INTACT but now separated -->
  <circle cx="710" cy="230" r="35" fill="none" stroke="#44ff44" stroke-width="6"/>
  <circle cx="710" cy="230" r="6" fill="#44ff44"/>
  <text x="710" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#44ff44">GND via — INTACT</text>
  <text x="710" y="295" text-anchor="middle" font-size="10" fill="#44ff44">still connects to In1.Cu GND</text>

  <!-- Dimension arrows -->
  <line x1="780" y1="180" x2="780" y2="160" stroke="#ff8888" stroke-width="1"/>
  <line x1="780" y1="183" x2="780" y2="195" stroke="#8fbc8f" stroke-width="1"/>
  <line x1="780" y1="198" x2="780" y2="230" stroke="#44ff44" stroke-width="1"/>
  <text x="800" y="170" font-size="9" fill="#ff8888">trace</text>
  <text x="800" y="192" font-size="9" fill="#8fbc8f">gap 0.3mm</text>
  <text x="800" y="218" font-size="9" fill="#44ff44">via ring</text>

  <text x="710" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#44ff44">Result: GND isolated from VBUS ✓</text>
  <text x="710" y="368" text-anchor="middle" font-size="10" fill="#8fbc8f">VBUS trace passes current normally</text>

  <!-- ============ VIA 2 (+5V) — BEFORE ============ -->
  <rect x="30" y="405" width="420" height="310" rx="8" fill="#1a1a2e" stroke="#c44" stroke-width="2"/>
  <text x="240" y="430" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff4444">VIA 2 (+5V) — BEFORE</text>
  <text x="240" y="448" text-anchor="middle" font-size="11" fill="#888">F.Cu zoom view — the short</text>

  <!-- VBUS vertical trace -->
  <rect x="150" y="460" width="20" height="230" fill="#ff4444" opacity="0.9" rx="2"/>
  <text x="130" y="575" font-size="12" fill="#ff8888" transform="rotate(-90,130,575)">VBUS vertical (0.5mm)</text>

  <!-- +5V via annular ring - overlapping -->
  <circle cx="210" cy="570" r="35" fill="none" stroke="#4488ff" stroke-width="6"/>
  <circle cx="210" cy="570" r="6" fill="#4488ff"/>
  <text x="260" y="595" font-size="12" font-weight="bold" fill="#4488ff">+5V via</text>
  <text x="260" y="610" font-size="10" fill="#4488ff">annular ring</text>

  <!-- Overlap zone -->
  <rect x="168" y="540" width="14" height="60" fill="#ff0" opacity="0.6"/>
  <text x="310" y="545" font-size="11" font-weight="bold" fill="#ff0">OVERLAP</text>
  <text x="310" y="560" font-size="11" fill="#ff0">0.2mm contact</text>
  <line x1="310" y1="550" x2="182" y2="565" stroke="#ff0" stroke-width="1"/>

  <text x="240" y="690" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff4444">Result: +5V = VBUS (short!)</text>

  <!-- ============ VIA 2 (+5V) — AFTER ============ -->
  <rect x="500" y="405" width="420" height="310" rx="8" fill="#1a1a2e" stroke="#4a4" stroke-width="2"/>
  <text x="710" y="430" text-anchor="middle" font-size="15" font-weight="bold" fill="#44ff44">VIA 2 (+5V) — AFTER SCRAPING</text>
  <text x="710" y="448" text-anchor="middle" font-size="11" fill="#8fbc8f">F.Cu zoom — gap created</text>

  <!-- VBUS vertical trace - INTACT -->
  <rect x="620" y="460" width="20" height="230" fill="#ff4444" opacity="0.9" rx="2"/>
  <text x="600" y="575" font-size="12" fill="#ff8888" transform="rotate(-90,600,575)">VBUS — INTACT</text>

  <!-- Scraped zone - BETWEEN trace and via -->
  <rect x="643" y="540" width="12" height="60" fill="#556b2f" stroke="#8fbc8f" stroke-width="1" rx="1"/>

  <!-- Arrow showing scrape location -->
  <line x1="700" y1="500" x2="655" y2="540" stroke="#8fbc8f" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="700" y="490" font-size="10" fill="#8fbc8f">SCRAPE HERE</text>
  <text x="700" y="505" font-size="10" fill="#8fbc8f">(vertical strip)</text>

  <!-- +5V via - INTACT, separated -->
  <circle cx="695" cy="570" r="35" fill="none" stroke="#4488ff" stroke-width="6"/>
  <circle cx="695" cy="570" r="6" fill="#4488ff"/>
  <text x="750" y="590" font-size="12" font-weight="bold" fill="#4488ff">+5V via</text>
  <text x="750" y="605" font-size="10" fill="#4488ff">INTACT</text>

  <!-- Dimensions -->
  <text x="648" y="530" font-size="8" fill="#8fbc8f">gap</text>
  <text x="645" y="615" font-size="8" fill="#8fbc8f">0.3mm</text>

  <text x="710" y="690" text-anchor="middle" font-size="12" font-weight="bold" fill="#44ff44">Result: +5V isolated from VBUS ✓</text>
  <text x="710" y="708" text-anchor="middle" font-size="10" fill="#8fbc8f">VBUS trace passes current normally</text>

  <!-- ============ KEY CONCEPT ============ -->
  <rect x="30" y="735" width="890" height="100" rx="8" fill="#111" stroke="#ffaa44" stroke-width="2"/>
  <text x="475" y="760" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffaa44">KEY: You DO NOT scrape the VBUS trace!</text>

  <rect x="60" y="775" width="20" height="15" fill="#ff4444" rx="2"/>
  <text x="90" y="787" font-size="12" fill="#fff">VBUS trace = DO NOT TOUCH (current still flows through it)</text>

  <rect x="60" y="798" width="20" height="15" fill="#556b2f" rx="2"/>
  <text x="90" y="810" font-size="12" fill="#fff">Scraped zone = 0.3mm strip of copper BETWEEN trace and via ring (becomes green fiberglass)</text>

  <circle cx="70" cy="828" r="10" fill="none" stroke="#44ff44" stroke-width="2"/>
  <text x="90" y="832" font-size="12" fill="#fff">Via ring = DO NOT TOUCH (via still connects to inner layers through barrel)</text>
</svg>