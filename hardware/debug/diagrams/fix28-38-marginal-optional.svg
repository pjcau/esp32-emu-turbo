<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="monospace">
  <rect width="900" height="500" fill="#0d1117"/>

  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#888">FIX 28-38 — Clearance marginale [OPZIONALE]</text>
  <text x="450" y="50" text-anchor="middle" font-size="13" fill="#666">Gap +0.025mm — misurare PRIMA con multimetro, intervenire SOLO se continuita chiusa</text>

  <!-- Legend -->
  <rect x="20" y="65" width="250" height="80" rx="6" fill="#161b22" stroke="#333"/>
  <text x="30" y="85" font-size="12" font-weight="bold" fill="#ccc">LEGENDA:</text>
  <rect x="30" y="95" width="40" height="8" fill="#44ff44" rx="2"/><text x="80" y="103" font-size="11" fill="#88ff88">GND via</text>
  <rect x="30" y="115" width="40" height="8" fill="#44aaff" rx="2"/><text x="80" y="123" font-size="11" fill="#88ccff">+3V3 via</text>
  <text x="30" y="140" font-size="10" fill="#888">Tutti su B.Cu, area x=133.45mm</text>

  <!-- Technique -->
  <rect x="300" y="65" width="580" height="80" rx="6" fill="#161b22" stroke="#555"/>
  <text x="590" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#ccc">PROCEDURA:</text>
  <text x="310" y="108" font-size="12" fill="#aaa">1. Multimetro in continuita: segnale ↔ via potenza</text>
  <text x="310" y="125" font-size="12" fill="#aaa">2. Se APERTA (beep NO) → NON TOCCARE, passare al successivo</text>
  <text x="310" y="142" font-size="12" fill="#ff8888">3. Se CHIUSA (beep SI) → raschiare come FIX 9-27</text>

  <!-- LCD_RD group -->
  <rect x="30" y="165" width="410" height="300" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1"/>
  <text x="235" y="190" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffaa44">LCD_RD — 5 via marginals</text>
  <text x="235" y="208" text-anchor="middle" font-size="11" fill="#888">B.Cu — tutte a x~133.45mm</text>

  <rect x="45" y="220" width="380" height="40" rx="4" fill="#161b22" stroke="#444"/>
  <text x="55" y="240" font-size="11" fill="#aaa">#28-31: 4x via GND @ x=133.45 (gap +0.025mm)</text>
  <circle cx="380" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <circle cx="400" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <circle cx="360" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <circle cx="340" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <text x="55" y="255" font-size="10" fill="#666">Misurare LCD_RD vs GND prima di intervenire</text>

  <rect x="45" y="270" width="380" height="40" rx="4" fill="#161b22" stroke="#444"/>
  <text x="55" y="290" font-size="11" fill="#aaa">#32: 1x via +3V3 @ (133.45, 26.25) (gap +0.025mm)</text>
  <circle cx="400" cy="287" r="8" fill="none" stroke="#44aaff" stroke-width="2"/>
  <text x="55" y="305" font-size="10" fill="#666">Misurare LCD_RD vs +3V3</text>

  <!-- Decision box -->
  <rect x="45" y="325" width="380" height="120" rx="6" fill="#1a2a1a" stroke="#4a4"/>
  <text x="235" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f4">DECISIONE:</text>
  <text x="55" y="372" font-size="11" fill="#afa">Multimetro APERTA → gap sufficiente, non toccare</text>
  <text x="55" y="392" font-size="11" fill="#faa">Multimetro CHIUSA → raschiare ~0.5mm attorno</text>
  <text x="55" y="425" font-size="10" fill="#888">Gap di soli 0.025mm = dipende dalla precisione</text>
  <text x="55" y="440" font-size="10" fill="#888">dell'incisione JLCPCB su questa board specifica</text>

  <!-- LCD_RST group -->
  <rect x="460" y="165" width="410" height="300" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1"/>
  <text x="665" y="190" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffaa44">LCD_RST — 5 via marginali</text>
  <text x="665" y="208" text-anchor="middle" font-size="11" fill="#888">B.Cu — tutte a x~133.45mm</text>

  <rect x="475" y="220" width="380" height="40" rx="4" fill="#161b22" stroke="#444"/>
  <text x="485" y="240" font-size="11" fill="#aaa">#33-36: 4x via GND @ x=133.45 (gap +0.025mm)</text>
  <circle cx="810" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <circle cx="830" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <circle cx="790" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <circle cx="770" cy="237" r="8" fill="none" stroke="#44ff44" stroke-width="2"/>
  <text x="485" y="255" font-size="10" fill="#666">Misurare LCD_RST vs GND prima di intervenire</text>

  <rect x="475" y="270" width="380" height="40" rx="4" fill="#161b22" stroke="#444"/>
  <text x="485" y="290" font-size="11" fill="#aaa">#37: 1x via +3V3 @ (133.45, 26.25) (gap +0.025mm)</text>
  <circle cx="830" cy="287" r="8" fill="none" stroke="#44aaff" stroke-width="2"/>
  <text x="485" y="305" font-size="10" fill="#666">Misurare LCD_RST vs +3V3</text>

  <!-- Decision box -->
  <rect x="475" y="325" width="380" height="120" rx="6" fill="#1a2a1a" stroke="#4a4"/>
  <text x="665" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f4">DECISIONE:</text>
  <text x="485" y="372" font-size="11" fill="#afa">Multimetro APERTA → non toccare</text>
  <text x="485" y="392" font-size="11" fill="#faa">Multimetro CHIUSA → raschiare</text>
  <text x="485" y="425" font-size="10" fill="#888">NOTA: LCD_RST su B.Cu — diverso dal FIX 3</text>
  <text x="485" y="440" font-size="10" fill="#888">che e su F.Cu. Sono segmenti diversi</text>

  <!-- Bottom note -->
  <text x="450" y="487" text-anchor="middle" font-size="12" fill="#888">Totale: 11 punti da misurare. Intervenire solo dove necessario.</text>
</svg>