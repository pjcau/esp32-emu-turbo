services:
  # Generate KiCad schematic from Python spec
  generate-sch:
    image: python:3.12-slim
    volumes:
      - ./scripts:/scripts:ro
      - ./hardware/kicad:/output
    working_dir: /scripts
    command: python3 -m generate_schematics /output

  # Export KiCad schematic to SVG/PDF
  kicad:
    build:
      context: ./docker/kicad
    volumes:
      - ./hardware/kicad:/project
      - ./website/static/img/schematics:/output
    working_dir: /project

  # Export PCB Gerbers with zone fill (kicad-cli + pcbnew Python API)
  kicad-pcb:
    build:
      context: ./docker/kicad
    volumes:
      - ./hardware/kicad:/project
      - ./hardware/kicad/gerbers:/gerbers
      - ./scripts:/scripts:ro
    working_dir: /project

  # Render PCB 3D with raytracer (includes 3D component models)
  kicad-3d:
    build:
      context: ./docker/kicad-3d
    volumes:
      - ./hardware/kicad:/project
      - ./website/static/img/renders:/output
    working_dir: /project

  # Render OpenSCAD enclosure to PNG
  openscad:
    build:
      context: ./docker/openscad
    init: true
    volumes:
      - ./hardware/enclosure:/project
      - ./website/static/img/renders:/output
    working_dir: /project

  # ESP-IDF firmware build
  idf-build:
    image: espressif/idf:v5.4
    volumes:
      - ./software:/project
      - idf-build-cache:/project/build
    working_dir: /project
    command: bash -c "idf.py set-target esp32s3 && idf.py build"

  # ESP-IDF firmware flash + serial monitor (requires USB device)
  idf-flash:
    image: espressif/idf:v5.4
    volumes:
      - ./software:/project
      - idf-build-cache:/project/build
    working_dir: /project
    devices:
      - "${ESP_PORT:-/dev/ttyUSB0}:${ESP_PORT:-/dev/ttyUSB0}"
    command: idf.py -p ${ESP_PORT:-/dev/ttyUSB0} flash monitor

  # QEMU ESP32-S3 benchmark — build firmware
  qemu-bench-build:
    build:
      context: ./docker/qemu-esp32
    volumes:
      - ./software:/project
      - ./test-roms:/test-roms:ro
      - qemu-bench-cache:/project/benchmark/build
    working_dir: /project/benchmark
    command: ["bash", "-c", "mkdir -p spiffs_data && cp /test-roms/nes/owlia.nes /test-roms/sms/silvervalley.sms /test-roms/gb/blarggs-cpu-instrs.gb /test-roms/gbc/ucity.gbc /test-roms/gg/Swabby-GG-1.11.gg /test-roms/pce/reflectron.pce /test-roms/snes/superbossgaiden.sfc spiffs_data/ && idf.py set-target esp32s3 && idf.py build && esptool.py --chip esp32s3 merge_bin --fill-flash-size 16MB -o build/flash_image.bin 0x0 build/bootloader/bootloader.bin 0x8000 build/partition_table/partition-table.bin 0x20000 build/esp32-emu-benchmark.bin && echo BUILD_OK"]

  # QEMU ESP32-S3 benchmark — run in emulator
  qemu-bench-run:
    build:
      context: ./docker/qemu-esp32
    volumes:
      - ./software:/project
      - qemu-bench-cache:/project/benchmark/build
    working_dir: /project/benchmark
    environment:
      - SDL_VIDEODRIVER=dummy
      - SDL_AUDIODRIVER=dummy
      - XDG_RUNTIME_DIR=/tmp
    command: ["bash", "-c", "timeout 600 qemu-system-xtensa -nographic -machine esp32s3 -m 32M -global driver=ssi_psram,property=is_octal,value=true -drive file=build/flash_image.bin,if=mtd,format=raw -global driver=timer.esp32.timg,property=wdt_disable,value=true -serial mon:stdio -no-reboot 2>&1 || true"]

  # QEMU ESP32-S3 interactive — VNC display + UART input
  qemu-interactive:
    build:
      context: ./docker/qemu-esp32
    volumes:
      - ./software:/project
      - ./docker/qemu-esp32/run-vnc.sh:/run-vnc.sh:ro
      - qemu-bench-cache:/project/benchmark/build
    working_dir: /project/benchmark
    ports:
      - "5901:5901"
      - "6080:6080"
    environment:
      - SDL_VIDEODRIVER=x11
      - DISPLAY=:99
    stdin_open: true
    tty: true
    command: ["bash", "/run-vnc.sh"]

  # Native SDL2 simulator via VNC (browser access)
  sim-vnc:
    build:
      context: ./docker/qemu-esp32
    volumes:
      - ./software:/project
      - ./test-roms:/test-roms:ro
      - ./docker/qemu-esp32/run-sim-vnc.sh:/run-sim-vnc.sh:ro
    working_dir: /project/sim
    ports:
      - "5901:5901"
      - "6080:6080"
    environment:
      - SDL_VIDEODRIVER=x11
      - DISPLAY=:99
    stdin_open: true
    tty: true
    command: ["bash", "/run-sim-vnc.sh", "/test-roms"]

  # External DFM analysis (KiBot + Tracespace)
  kibot:
    build:
      context: ./docker/kibot
    platform: linux/amd64
    volumes:
      - ./hardware/kicad:/project
      - ./release_jlcpcb:/release:ro
      - ./hardware/kicad/external-dfm-output:/output
    working_dir: /project

volumes:
  idf-build-cache:
  qemu-bench-cache:
