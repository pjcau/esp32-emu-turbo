<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Helvetica, Arial, sans-serif">
  <rect width="960" height="560" fill="#1b3a2d"/>
  <text x="480" y="40" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="bold">C2 tantalum polarity — as built vs correct</text>

  <!-- ===== LEFT PANEL: AS BUILT (WRONG) ===== -->
  <g>
    <rect x="30" y="70" width="430" height="330" rx="12" fill="#24493a" stroke="#e53935" stroke-width="4"/>
    <text x="245" y="105" text-anchor="middle" fill="#ff6f60" font-size="22" font-weight="bold">AS BUILT — WRONG ✗</text>

    <!-- pads -->
    <rect x="95" y="220" width="70" height="90" rx="6" fill="#c0c0c0"/>
    <rect x="325" y="220" width="70" height="90" rx="6" fill="#c0c0c0"/>
    <text x="130" y="345" text-anchor="middle" fill="#ffe082" font-size="18" font-weight="bold">+3V3 pad</text>
    <text x="360" y="345" text-anchor="middle" fill="#ffe082" font-size="18" font-weight="bold">GND pad</text>
    <text x="130" y="368" text-anchor="middle" fill="#ffe082" font-size="14">(from AMS1117 VOUT)</text>

    <!-- body -->
    <rect x="150" y="230" width="190" height="70" fill="#2b2b2b" stroke="#000" stroke-width="2"/>
    <!-- stripe on RIGHT (GND side) -->
    <rect x="305" y="230" width="35" height="70" fill="#bdbdbd"/>
    <text x="245" y="273" text-anchor="middle" fill="#9e9e9e" font-size="16" transform="rotate(180 245 268)">CJ7</text>

    <!-- stripe callout -->
    <line x1="322" y1="225" x2="322" y2="180" stroke="#ff6f60" stroke-width="3"/>
    <text x="322" y="168" text-anchor="middle" fill="#ff6f60" font-size="16" font-weight="bold">stripe (+ anode) on GND side</text>

    <!-- consequence -->
    <text x="245" y="395" text-anchor="middle" fill="#ff8a80" font-size="16" font-weight="bold">→ reverse-biased tantalum = SHORT</text>
  </g>

  <!-- ===== RIGHT PANEL: CORRECT ===== -->
  <g>
    <rect x="500" y="70" width="430" height="330" rx="12" fill="#24493a" stroke="#43a047" stroke-width="4"/>
    <text x="715" y="105" text-anchor="middle" fill="#81c784" font-size="22" font-weight="bold">CORRECT ✓</text>

    <!-- pads -->
    <rect x="565" y="220" width="70" height="90" rx="6" fill="#c0c0c0"/>
    <rect x="795" y="220" width="70" height="90" rx="6" fill="#c0c0c0"/>
    <text x="600" y="345" text-anchor="middle" fill="#ffe082" font-size="18" font-weight="bold">+3V3 pad</text>
    <text x="830" y="345" text-anchor="middle" fill="#ffe082" font-size="18" font-weight="bold">GND pad</text>

    <!-- body -->
    <rect x="620" y="230" width="190" height="70" fill="#2b2b2b" stroke="#000" stroke-width="2"/>
    <!-- stripe on LEFT (+3V3 side) -->
    <rect x="620" y="230" width="35" height="70" fill="#bdbdbd"/>
    <text x="730" y="275" text-anchor="middle" fill="#9e9e9e" font-size="16">CJ7</text>

    <!-- stripe callout -->
    <line x1="637" y1="225" x2="637" y2="180" stroke="#81c784" stroke-width="3"/>
    <text x="637" y="168" text-anchor="middle" fill="#81c784" font-size="16" font-weight="bold">stripe (+ anode) on +3V3 side</text>

    <text x="715" y="395" text-anchor="middle" fill="#a5d6a7" font-size="16" font-weight="bold">→ cap blocks DC, rail is clean</text>
  </g>

  <!-- ===== BOTTOM NOTE ===== -->
  <rect x="30" y="430" width="900" height="100" rx="12" fill="#fff3cd"/>
  <text x="480" y="468" text-anchor="middle" fill="#7a5c00" font-size="20" font-weight="bold">⚠ Opposite marking conventions — the classic trap</text>
  <text x="480" y="498" text-anchor="middle" fill="#5c4400" font-size="17">TANTALUM capacitor: stripe = ANODE (+)&#160;&#160;&#160;·&#160;&#160;&#160;DIODE: band = CATHODE (−)</text>
  <text x="480" y="520" text-anchor="middle" fill="#5c4400" font-size="15">Reading the tantalum stripe as a diode cathode band led to the "diode to chassis" false trail.</text>
</svg>
